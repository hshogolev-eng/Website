<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-title" content="Training Log"/>
<title>Training Log</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#060608;color:#EEF2FF;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;font-size:15px;min-height:100vh}
:root{--cyan:#00E5FF;--lime:#00FF7F;--amber:#FFB800;--pink:#FF2D6B;--surface:#0D0F1A;--card:#111322;--border:#1E2235;--muted:#7B89AC;--purple:#BF7FFF}
input,button{font-family:inherit}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.5)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#1E2235}
.screen{display:none;max-width:460px;margin:0 auto;min-height:100vh;padding-bottom:30px}
.screen.active{display:block}
.sticky{position:sticky;top:0;z-index:20;background:rgba(13,15,26,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:11px 16px;display:flex;align-items:center;gap:10px}
.lbl{font-size:8px;letter-spacing:.2em;padding:2px 7px;border-radius:2px;border:1px solid}
.btn{display:inline-block;border-radius:3px;font-weight:700;font-size:12px;letter-spacing:.1em;padding:9px 18px;cursor:pointer;border:1px solid;background:transparent;transition:opacity .1s}
.btn:active{opacity:.6}
.btn-sm{padding:5px 11px;font-size:10px}
.btn-full{width:100%}
.inp{background:#060608;border:1px solid var(--border);color:#EEF2FF;font-size:14px;padding:8px 12px;border-radius:3px;outline:none;width:100%;font-family:monospace}
.inp:focus{border-color:var(--cyan)}
.card{background:var(--card);border:1px solid var(--border);border-radius:4px}
.mono{font-family:monospace}
.muted{color:var(--muted)}
.tag{font-size:7px;letter-spacing:.15em;font-family:monospace}
/* modal overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--surface);border-top:2px solid;width:100%;max-width:460px;border-radius:12px 12px 0 0;padding:20px 16px 40px;max-height:92vh;overflow-y:auto}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.confirm-overlay.open{display:flex}
@keyframes prpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.pr-badge{animation:prpulse 2s infinite;display:inline-block}
</style>
</head>
<body>

<!-- HOME -->
<div id="scr-home" class="screen active">
  <div style="padding:22px 16px 0">
    <div class="mono tag" style="color:var(--cyan);margin-bottom:5px">CYCLING // FULL BODY</div>
    <div style="font-size:32px;font-weight:700;line-height:1;margin-bottom:18px">TRAINING<br><span style="color:var(--amber)">LOG</span></div>
    <!-- stats -->
    <div id="home-stats" style="display:flex;gap:1px;margin-bottom:16px;border-radius:3px;overflow:hidden"></div>
    <!-- suggestion -->
    <div id="home-suggestion" style="display:none;background:var(--card);border:1px solid rgba(0,229,255,.3);border-radius:4px;padding:12px 14px;margin-bottom:16px">
      <div class="mono tag" style="color:var(--cyan);margin-bottom:4px">СЛЕДУЮЩАЯ ПО ПРОГРАММЕ</div>
      <div id="sug-label" style="font-size:16px;font-weight:700"></div>
      <div id="sug-date" class="mono muted" style="font-size:9px;margin-top:2px"></div>
      <div style="margin-top:8px"><button id="sug-btn" class="btn btn-sm" style="color:var(--cyan);border-color:var(--cyan)">НАЧАТЬ →</button></div>
    </div>
    <!-- body weight -->
    <div style="margin-bottom:18px">
      <div class="mono tag muted" style="margin-bottom:8px">МОЙ ВЕС</div>
      <div style="display:flex;gap:8px;margin-bottom:6px">
        <input id="bw-inp" type="number" class="inp" placeholder="Введи вес кг..." style="flex:1"/>
        <button class="btn" onclick="saveBW()" style="color:var(--lime);border-color:var(--lime)">СОХРАНИТЬ</button>
      </div>
      <div id="bw-last" class="mono muted" style="font-size:10px"></div>
    </div>
    <!-- grid -->
    <div class="mono tag muted" style="margin-bottom:10px">ВЫБРАТЬ ТРЕНИРОВКУ</div>
    <div id="wgrid" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px"></div>
    <!-- recent -->
    <div id="recent-section" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span class="mono tag muted">ПОСЛЕДНИЕ</span>
        <button onclick="showScreen('scr-history')" style="background:none;border:none;cursor:pointer;font-family:monospace;font-size:8px;color:var(--amber)">ИСТОРИЯ →</button>
      </div>
      <div id="recent-list"></div>
    </div>
  </div>
</div>

<!-- WORKOUT -->
<div id="scr-workout" class="screen">
  <div class="sticky">
    <button onclick="showScreen('scr-home')" style="background:none;border:none;cursor:pointer;font-family:monospace;font-size:10px;color:var(--muted)">← НАЗАД</button>
    <span id="w-lbl" class="lbl" style="font-size:8px"></span>
    <span id="w-title" style="font-size:17px;font-weight:700;flex:1"></span>
    <span id="w-pct" style="font-family:monospace;font-size:11px;font-weight:700"></span>
  </div>
  <div id="w-bar-wrap" style="height:2px;background:var(--border)"><div id="w-bar" style="height:100%;width:0;transition:width .4s"></div></div>
  <div id="w-info-block" style="display:none;margin:14px 14px 0;border-radius:6px;padding:14px 16px"></div>
  <div id="ex-list" style="padding:14px"></div>
</div>

<!-- HISTORY -->
<div id="scr-history" class="screen">
  <div class="sticky">
    <button onclick="showScreen('scr-home')" style="background:none;border:none;cursor:pointer;font-family:monospace;font-size:10px;color:var(--muted)">← НАЗАД</button>
    <span style="font-size:17px;font-weight:700;flex:1">ВСЯ ИСТОРИЯ</span>
  </div>
  <div id="hist-filters" style="display:flex;gap:5px;padding:11px 14px;overflow-x:auto;border-bottom:1px solid var(--border)"></div>
  <div id="hist-list" style="padding:14px"></div>
</div>

<!-- PROGRESS -->
<div id="scr-progress" class="screen">
  <div class="sticky">
    <button onclick="showScreen('scr-workout')" style="background:none;border:none;cursor:pointer;font-family:monospace;font-size:10px;color:var(--muted)">← НАЗАД</button>
    <div style="flex:1"><div class="mono muted" style="font-size:8px">ПРОГРЕСС</div><div id="prog-title" style="font-size:15px;font-weight:700"></div></div>
    <span id="prog-pr" style="display:none" class="mono pr-badge" style="font-size:9px;color:var(--amber);border:1px solid rgba(255,184,0,.4);border-radius:3px;padding:3px 8px">🏆 ПР</span>
  </div>
  <div id="prog-content" style="padding:14px"></div>
</div>

<!-- LOG MODAL -->
<div id="log-overlay" class="overlay">
  <div id="log-modal" class="modal">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
      <div>
        <span id="lm-badge" class="lbl" style="font-size:8px"></span>
        <div id="lm-title" style="font-size:17px;font-weight:700;margin-top:5px"></div>
        <div id="lm-plan" class="mono muted" style="font-size:9px;margin-top:2px"></div>
      </div>
      <button onclick="closeLogModal()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:22px;line-height:1">×</button>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <div style="flex:1;background:var(--border);border-radius:2px;height:3px;overflow:hidden">
        <div id="lm-prog-bar" style="height:100%;width:0;transition:width .3s"></div>
      </div>
      <span id="lm-prog-txt" class="mono" style="font-size:9px;white-space:nowrap"></span>
    </div>
    <div style="margin-bottom:14px">
      <div class="mono muted tag" style="margin-bottom:5px">ДАТА</div>
      <input id="lm-date" type="date" class="inp"/>
    </div>
    <div id="lm-last" style="display:none;border-radius:3px;padding:8px 12px;margin-bottom:14px;display:none"></div>
    <div class="mono muted tag" style="margin-bottom:12px">ВЕС И ПОВТОРЕНИЯ</div>
    <div id="lm-sets"></div>
    <button onclick="addSet()" class="btn btn-full" style="color:var(--muted);border-color:var(--muted);margin-bottom:12px;opacity:.7">+ ДОБАВИТЬ ПОДХОД</button>
    <input id="lm-note" type="text" class="inp" placeholder="Заметка (самочувствие, техника...)" style="margin-bottom:14px"/>
    <div id="lm-totals" style="display:none;display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px"></div>
    <div style="display:grid;grid-template-columns:1fr 2fr;gap:8px">
      <button onclick="closeLogModal()" class="btn" style="color:var(--muted);border-color:var(--muted)">ОТМЕНА</button>
      <button id="lm-save-btn" onclick="saveLog()" class="btn btn-full" style="color:var(--lime);border-color:var(--lime)">СОХРАНИТЬ →</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div id="confirm-overlay" class="confirm-overlay">
  <div style="background:var(--surface);border:1px solid rgba(255,45,107,.4);border-radius:6px;padding:24px;max-width:300px;width:100%">
    <div id="conf-title" style="font-size:15px;font-weight:700;margin-bottom:8px"></div>
    <div id="conf-text" class="mono muted" style="font-size:10px;margin-bottom:18px"></div>
    <div style="display:flex;gap:8px">
      <button onclick="closeConfirm()" class="btn" style="color:var(--muted);border-color:var(--muted)">ОТМЕНА</button>
      <button id="conf-ok" class="btn btn-full" style="color:var(--pink);border-color:var(--pink)">УДАЛИТЬ</button>
    </div>
  </div>
</div>

function getEx(wKey,name){ const c=DB.custom[wKey+'__'+name]; const b=BASE[wKey].exercises.find(e=>e.name===name); return c?{...b,...c}:b; }
function getW(wKey){ return {...BASE[wKey],exercises:BASE[wKey].exercises.map(e=>getEx(wKey,e.name))}; }

// ─── UTILS ──────────────────────────────────────────────────
const todayISO=()=>new Date().toISOString().split('T')[0];
const fmt=iso=>new Date(iso).toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'});
const fmtL=iso=>new Date(iso).toLocaleDateString('ru-RU',{day:'2-digit',month:'short',year:'numeric'});
const maxW=sets=>sets.length?Math.max(...sets.map(s=>parseFloat(s.weight||0))):0;
const vol=sets=>sets.reduce((a,s)=>a+(parseFloat(s.weight||0)*parseInt(s.reps||0)),0);
const h=s=>`<span style="color:#7B89AC;font-family:monospace;font-size:9px">${s}</span>`;
function el(tag,attrs,inner=''){
  const a=Object.entries(attrs||{}).map(([k,v])=>`${k}="${v}"`).join(' ');
  return `<${tag} ${a}>${inner}</${tag}>`;
}

// ─── HOME ────────────────────────────────────────────────────
function renderHome(){

  const today=todayISO();
  const d=new Date(); const ws=new Date(d); ws.setDate(d.getDate()-d.getDay()+1); const we=new Date(d); we.setDate(d.getDate()-d.getDay()+7);
  const wsISO=ws.toISOString().split('T')[0], weISO=we.toISOString().split('T')[0];
  const wkSess=new Set(logs.filter(l=>l.date>=wsISO&&l.date<=weISO).map(l=>l.sid)).size;
  const sortedBW=[...bws].sort((a,b)=>a.date.localeCompare(b.date));
  const lastBW=sortedBW[sortedBW.length-1];

  // stats
  const stats=[{l:'СЕССИЙ',v:sessions,c:'#FFB800'},{l:'ЭТА НЕДЕЛЯ',v:wkSess,c:'#00E5FF'},{l:'ВЕС',v:lastBW?lastBW.weight+'кг':'—',c:'#00FF7F'}];
  document.getElementById('home-stats').innerHTML=stats.map(s=>`
    <div style="flex:1;background:#111322;padding:11px 0;text-align:center;border-top:2px solid ${s.c}">
      <div style="font-size:20px;font-weight:700;color:${s.c}">${s.v}</div>
      <div style="font-family:monospace;font-size:7px;color:#7B89AC;letter-spacing:.15em;margin-top:1px">${s.l}</div>
    </div>`).join('');

  // suggestion
  const sug=suggestNext();
  const sugEl=document.getElementById('home-suggestion');
  if(sug){
    document.getElementById('sug-label').textContent=BASE[sug.key].label;
    document.getElementById('sug-date').textContent='Последняя: '+fmtL(sug.lastDate);
    document.getElementById('sug-btn').onclick=()=>openWorkout(sug.key);
    sugEl.style.display='block';
  } else sugEl.style.display='none';

  // bw
  document.getElementById('bw-inp').value='';
  document.getElementById('bw-last').textContent=lastBW?'Последний: '+lastBW.weight+' кг ('+fmtL(lastBW.date)+')':'';

  // grid
  document.getElementById('wgrid').innerHTML=Object.entries(BASE).map(([key,w])=>{
    const cnt=new Set(logs.filter(l=>l.wKey===key).map(l=>l.sid)).size;
    const isNext=sug&&sug.key===key;
    return `<div onclick="openWorkout('${key}')" style="background:#111322;border:1px solid ${isNext?w.color+'66':'#1E2235'};border-radius:4px;padding:16px 13px;cursor:pointer">
      <div style="font-family:monospace;font-size:8px;letter-spacing:.2em;color:${w.color};margin-bottom:5px">${w.tag}${isNext?' <span style="opacity:.5;font-size:7px">← СЛЕД.</span>':''}</div>
      <div style="font-size:19px;font-weight:700;margin-bottom:4px">${w.label}</div>
      <div style="font-family:monospace;font-size:9px;color:#7B89AC">${cnt>0?cnt+' сессий':'Нет данных'}</div>
    </div>`;
  }).join('');

  // recent
  const sorted=[...logs].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,3);
  const recSec=document.getElementById('recent-section');
  if(sorted.length){
    recSec.style.display='block';
    document.getElementById('recent-list').innerHTML=sorted.map(l=>{
      const wc=BASE[l.wKey]?.color||'#FFB800';
      return `<div style="background:#111322;border:1px solid #1E2235;border-radius:3px;padding:9px 13px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center">

        <div style="font-family:monospace;font-size:9px;color:#7B89AC">${BASE[l.wKey]?.label||''} · ${fmtL(l.date)}</div></div>
        <div style="text-align:right"><div style="font-size:14px;font-weight:700;color:${wc}">${maxW(l.sets)} кг</div>
        <div style="font-family:monospace;font-size:8px;color:#7B89AC">${l.sets.length} подх.</div></div>
      </div>`;
    }).join('');

function saveBW(){
  const v=parseFloat(document.getElementById('bw-inp').value);
  if(!v||v<=0) return;
  DB.bws.push({id:Date.now()+'',date:todayISO(),weight:v});
  save(); renderHome();
}

function suggestNext(){
  if(!DB.logs.length) return null;
  const last=[...DB.logs].sort((a,b)=>b.date.localeCompare(a.date))[0];
  const w=BASE[last.wKey]; if(!w||!w.pair) return null;
  return {key:w.pair,lastDate:last.date};
}

function openGif(q){ window.open('https://www.google.com/search?q='+encodeURIComponent(q+' exercise gif')+'&tbm=isch','_blank'); }

// ─── LOG MODAL ────────────────────────────────────────────────
let lmSets=[], lmWKey='', lmExName='', lmEditId=null, lmPlanned=3;

  document.getElementById('lm-badge').style.borderColor=col+'55';

  document.getElementById('lm-plan').textContent='ПЛАН: '+ex.plan;

  } else {

      lastEl.innerHTML=`<span style="font-family:monospace;font-size:10px;color:${col}CC;flex:1;margin-right:8px">${fmtL(last.date)}: ${last.sets.map(s=>s.weight+'кг×'+s.reps).join(' / ')}</span>
        <button onclick="copyLast('${last.id}')" class="btn btn-sm" style="color:${col};border-color:${col};white-space:nowrap">↓ КОПИРОВАТЬ</button>`;
    } else lastEl.style.display='none';
  }

function copyLast(id){ const l=DB.logs.find(x=>x.id===id); if(l){lmSets=l.sets.map(s=>({weight:s.weight,reps:s.reps}));renderSets(BASE[lmWKey].color);} }

function renderSets(col){
  document.getElementById('lm-prog-bar').style.background=col;
  document.getElementById('lm-prog-txt').style.color=col;

  document.getElementById('lm-sets').innerHTML=lmSets.map((s,i)=>{
    const f=s.weight&&s.reps;
    return `<div id="set-card-${i}" style="background:#111322;border:1px solid ${f?col+'44':'#1E2235'};border-radius:3px;padding:12px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span id="set-label-${i}" style="font-family:monospace;font-size:9px;color:${f?col:'#7B89AC'}">ПОДХОД ${i+1} ${f?'✓':''}</span>
        ${lmSets.length>1?`<button onclick="removeSet(${i})" style="background:none;border:none;cursor:pointer;color:#7B89AC;font-size:15px">×</button>`:''}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><div style="font-family:monospace;font-size:8px;color:#7B89AC;margin-bottom:5px">ВЕС (кг)</div>
          <input type="number" inputmode="decimal" class="inp" value="${s.weight}"
            oninput="lmSets[${i}].weight=this.value;updateSetStats('${col}')"
            style="text-align:center;font-size:22px;font-weight:700;color:${col};padding:10px 8px"/></div>
        <div><div style="font-family:monospace;font-size:8px;color:#7B89AC;margin-bottom:5px">ПОВТОРЕНИЙ</div>
          <input type="number" inputmode="numeric" class="inp" value="${s.reps}"
            oninput="lmSets[${i}].reps=this.value;updateSetStats('${col}')"
            style="text-align:center;font-size:22px;font-weight:700;color:#00E5FF;padding:10px 8px"/></div>
      </div>
    </div>`;
  }).join('');

  updateSetStats(col);
}

function updSet(i,f,v){
  lmSets[i][f]=v;
  // только обновляем статистику — НЕ перерисовываем поля ввода
  updateSetStats(BASE[lmWKey].color);
}
function removeSet(i){ if(lmSets.length>1){lmSets.splice(i,1);renderSets(BASE[lmWKey].color);} }
function addSet(){ lmSets.push({weight:lmSets[lmSets.length-1]?.weight||'',reps:''}); renderSets(BASE[lmWKey].color); }

// Обновляет только прогресс-бар, счётчик подходов и итоги — без пересоздания полей ввода
function updateSetStats(col){
  const done=lmSets.filter(s=>s.weight&&s.reps).length;
  const pct=Math.min(done/lmPlanned,1)*100;
  document.getElementById('lm-prog-bar').style.width=pct+'%';
  document.getElementById('lm-prog-txt').textContent=done+' / '+lmPlanned+' подх.';

  // обновляем цвет рамки каждого подхода
  lmSets.forEach((s,i)=>{
    const card=document.getElementById('set-card-'+i);
    const label=document.getElementById('set-label-'+i);
    if(!card||!label) return;
    const f=s.weight&&s.reps;
    card.style.borderColor=f?col+'44':'#1E2235';
    label.textContent='ПОДХОД '+(i+1)+' '+(f?'✓':'');
    label.style.color=f?col:'#7B89AC';
  });

  // итоги
  const v=vol(lmSets), mw=maxW(lmSets);
  const tot=document.getElementById('lm-totals');
  if(v>0){
    tot.style.display='grid';
    tot.innerHTML=[{l:'ОБЪЁМ',v:v.toFixed(0)+' кг',c:'#00E5FF'},{l:'МАКС. ВЕС',v:mw+' кг',c:col}].map(s=>
      `<div style="background:#111322;border-top:2px solid ${s.c};border-radius:3px;padding:9px 10px;text-align:center">
        <div style="font-size:20px;font-weight:700;color:${s.c}">${s.v}</div>
        <div style="font-family:monospace;font-size:7px;color:#7B89AC;margin-top:2px">${s.l}</div>
      </div>`).join('');
  } else tot.style.display='none';
}

function saveLog(){
  const valid=lmSets.filter(s=>s.weight!==''&&s.reps!=='');
  if(!valid.length) return;
  const note=document.getElementById('lm-note').value;
  const date=document.getElementById('lm-date').value;
  if(lmEditId){
    DB.logs=DB.logs.map(l=>l.id===lmEditId?{...l,sets:valid,note,date}:l);
  } else {
    DB.logs.push({id:Date.now()+'',wKey:lmWKey,exName:lmExName,date,sid:Date.now()+'',sets:valid,note});
  }
  save();
  closeLogModal();
  openWorkout(lmWKey);
}

function closeLogModal(){ document.getElementById('log-overlay').classList.remove('open'); }

// ─── PROGRESS ────────────────────────────────────────────────
function openProgress(wKey,exName){
  curProgress={wKey,exName};
  document.getElementById('prog-title').textContent=exName;
  const logs=[...DB.logs].filter(l=>l.wKey===wKey&&l.exName===exName).sort((a,b)=>a.date.localeCompare(b.date));
  const allMax=logs.length?Math.max(...logs.map(l=>maxW(l.sets))):0;
  const last=logs[logs.length-1],prev=logs[logs.length-2];
  const isPR=last&&maxW(last.sets)===allMax&&logs.length>1;
  const delta=last&&prev?maxW(last.sets)-maxW(prev.sets):null;

  const prEl=document.getElementById('prog-pr');
  prEl.style.display=isPR?'inline-block':'none';

  let html='';
  if(!logs.length){
    html='<div style="text-align:center;padding:70px 20px;color:#7B89AC"><div style="font-size:36px;margin-bottom:12px;opacity:.2">◈</div><div style="font-family:monospace;font-size:10px">НЕТ ДАННЫХ</div></div>';
  } else {
    const dColor=delta>0?'#00FF7F':delta<0?'#FF2D6B':'#7B89AC';
    html+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:18px">`;
    [{l:'РЕКОРД',v:allMax+'кг',c:'#FFB800'},{l:'ПОСЛЕДНИЙ',v:last?maxW(last.sets)+'кг':'—',c:'#EEF2FF'},
     {l:'ΔВЕС',v:delta!==null?(delta>0?'+':'')+delta+'кг':'—',c:dColor},{l:'СЕССИЙ',v:logs.length,c:'#00E5FF'}].forEach(s=>{
      html+=`<div style="background:#111322;border-top:2px solid ${s.c};border-radius:3px;padding:8px 6px;text-align:center">
        <div style="font-size:15px;font-weight:700;color:${s.c}">${s.v}</div>
        <div style="font-family:monospace;font-size:7px;color:#7B89AC;margin-top:2px">${s.l}</div></div>`;
    });
    html+=`</div>`;

    // simple SVG chart
    html+=svgChart(logs,'#FFB800');

    html+=`<div style="font-family:monospace;font-size:8px;color:#7B89AC;letter-spacing:.15em;margin-bottom:10px">ИСТОРИЯ</div>`;
    [...logs].reverse().forEach(l=>{
      const isPR2=maxW(l.sets)===allMax;
      html+=`<div style="background:#111322;border:1px solid ${isPR2?'#FFB80044':'#1E2235'};border-radius:3px;padding:10px 13px;margin-bottom:6px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-family:monospace;font-size:9px;color:#7B89AC">${fmtL(l.date)}</span>
          <span style="font-family:monospace;font-size:10px;color:#FFB800">${maxW(l.sets)} кг · ${vol(l.sets).toFixed(0)} кг${isPR2?' 🏆':''}</span>
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          ${l.sets.map(s=>`<span style="background:#060608;border:1px solid #1E2235;border-radius:2px;padding:3px 8px;font-family:monospace;font-size:10px">${s.weight}кг×${s.reps}</span>`).join('')}
        </div>${l.note?`<div style="font-size:10px;color:#7B89AC;margin-top:5px;font-style:italic">${l.note}</div>`:''}
      </div>`;
    });
  }
  document.getElementById('prog-content').innerHTML=html;
  showScreen('scr-progress');
}

function svgChart(logs,color){
  if(logs.length<2) return '';
  const W=320,H=100,pad=30;
  const vals=logs.map(l=>maxW(l.sets));
  const mn=Math.min(...vals),mx=Math.max(...vals);
  const range=mx-mn||1;
  const pts=vals.map((v,i)=>{
    const x=pad+(W-pad*2)*i/(vals.length-1);
    const y=H-pad-(v-mn)/range*(H-pad*2);
    return `${x},${y}`;
  });
  const labels=[logs[0],logs[logs.length-1]].map((l,i)=>{
    const x=i===0?pad:W-pad;
    return `<text x="${x}" y="${H-5}" style="font-size:9px;fill:#7B89AC;font-family:monospace;text-anchor:${i===0?'start':'end'}">${fmt(l.date)}</text>`;
  }).join('');
  return `<div style="background:#111322;border:1px solid #1E2235;border-radius:4px;padding:10px;margin-bottom:18px;overflow-x:auto">
    <div style="font-family:monospace;font-size:8px;color:#7B89AC;margin-bottom:6px">МАКС. ВЕС (кг)</div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px">
      <polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round"/>
      ${vals.map((v,i)=>{const x=pad+(W-pad*2)*i/(vals.length-1);const y=H-pad-(v-mn)/range*(H-pad*2);return `<circle cx="${x}" cy="${y}" r="4" fill="${color}"/>`;}).join('')}
      ${labels}
      <text x="${pad}" y="${H-pad-(vals[0]-mn)/range*(H-pad*2)-8}" style="font-size:9px;fill:${color};font-family:monospace">${vals[0]}кг</text>
      <text x="${W-pad}" y="${H-pad-(vals[vals.length-1]-mn)/range*(H-pad*2)-8}" style="font-size:9px;fill:${color};font-family:monospace;text-anchor:end">${vals[vals.length-1]}кг</text>
    </svg>
  </div>`;
}

// ─── HISTORY ─────────────────────────────────────────────────
function renderHistory(){
  const filters=[['ALL','ВСЕ'],...Object.entries(BASE).map(([k,w])=>[k,w.label])];
  document.getElementById('hist-filters').innerHTML=filters.map(([k,l])=>
    `<button onclick="setHistFilter('${k}')" style="background:${histFilter===k?'rgba(255,184,0,.15)':'#111322'};border:1px solid ${histFilter===k?'#FFB800':'#1E2235'};color:${histFilter===k?'#FFB800':'#7B89AC'};border-radius:3px;padding:4px 10px;cursor:pointer;font-family:monospace;font-size:8px;white-space:nowrap">${l}</button>`
  ).join('');

  const filtered=[...DB.logs].filter(l=>histFilter==='ALL'||l.wKey===histFilter).sort((a,b)=>b.date.localeCompare(a.date));
  const grouped={};
  filtered.forEach(l=>{(grouped[l.date]||(grouped[l.date]=[])).push(l);});

  let html='';
  Object.entries(grouped).forEach(([date,entries])=>{
    html+=`<div style="margin-bottom:18px">
      <div style="font-family:monospace;font-size:8px;color:#7B89AC;letter-spacing:.15em;margin-bottom:8px;display:flex;justify-content:space-between">
        <span>${fmtL(date)}</span><span>${entries.length} упр.</span></div>`;
    entries.forEach(l=>{
      const wc=BASE[l.wKey]?.color||'#FFB800';
      html+=`<div style="background:#111322;border:1px solid #1E2235;border-radius:3px;padding:9px 13px;margin-bottom:5px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><div style="font-size:13px;font-weight:600;margin-bottom:1px">${l.exName}</div>
            <div style="font-family:monospace;font-size:8px;color:#7B89AC">${BASE[l.wKey]?.label||''}</div></div>
          <div style="display:flex;align-items:center;gap:8px">
            <div style="text-align:right"><div style="font-size:14px;font-weight:700;color:${wc}">${maxW(l.sets)} кг</div>
              <div style="font-family:monospace;font-size:8px;color:#7B89AC">${l.sets.length} подх.</div></div>
            <button onclick="openLogModal('${l.wKey}','${l.exName}','${l.id}')" class="btn btn-sm" style="color:#FFB800;border-color:#FFB800">✎</button>
            <button onclick="confirmDelete('${l.id}')" style="background:none;border:none;cursor:pointer;color:#7B89AC;font-size:14px;opacity:.5">🗑</button>
          </div>
        </div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:6px">
          ${l.sets.map(s=>`<span style="background:#060608;border:1px solid #1E2235;border-radius:2px;padding:2px 7px;font-family:monospace;font-size:9px">${s.weight}кг×${s.reps}</span>`).join('')}
        </div>${l.note?`<div style="font-size:10px;color:#7B89AC;margin-top:5px;font-style:italic">${l.note}</div>`:''}
      </div>`;
    });
    html+='</div>';
  });
  if(!filtered.length) html='<div style="text-align:center;color:#7B89AC;padding:60px 20px;font-family:monospace;font-size:10px">НЕТ ЗАПИСЕЙ</div>';
  document.getElementById('hist-list').innerHTML=html;
}
function setHistFilter(f){ histFilter=f; renderHistory(); }

// ─── CONFIRM DELETE ──────────────────────────────────────────
function confirmDelete(id){
  confirmCb=()=>{ DB.logs=DB.logs.filter(l=>l.id!==id); save(); renderHistory(); closeConfirm(); };
  document.getElementById('conf-title').textContent='Удалить запись?';
  document.getElementById('conf-text').textContent='Действие нельзя отменить.';
  document.getElementById('conf-ok').onclick=confirmCb;
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm(){ document.getElementById('confirm-overlay').classList.remove('open'); }

// ─── INIT ────────────────────────────────────────────────────
renderHome();
</script>
