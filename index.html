<script>
const LS='tl_v1';
const DB={logs:[],bws:[],sessions:{}};
try{const r=localStorage.getItem(LS);if(r)Object.assign(DB,JSON.parse(r));}catch(e){}
const sv=()=>{try{localStorage.setItem(LS,JSON.stringify(DB));}catch(e){alert('Ошибка хранилища: '+e);}};
const td=()=>new Date().toISOString().split('T')[0];
const fL=d=>new Date(d).toLocaleDateString('ru-RU',{day:'2-digit',month:'short',year:'numeric'});
const f2=d=>new Date(d).toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'});
const mW=s=>s.length?Math.max(...s.map(x=>parseFloat(x.w||0))):0;
const vl=s=>s.reduce((a,x)=>a+parseFloat(x.w||0)*parseInt(x.r||0),0);

function expData(){
  const b=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='training-log-'+td()+'.json';a.click();URL.revokeObjectURL(a.href);
}
function impData(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{try{
    const d=JSON.parse(e.target.result);
    if(!d.logs||!Array.isArray(d.logs)){alert('Неверный формат файла.');return;}
    if(!confirm('Импортировать '+d.logs.length+' записей? Они объединятся с текущими.'))return;
    const ids=new Set(DB.logs.map(l=>l.id));
    DB.logs=[...DB.logs,...d.logs.filter(l=>!ids.has(l.id))];
    const bids=new Set(DB.bws.map(b=>b.id));
    DB.bws=[...DB.bws,...(d.bws||[]).filter(b=>!bids.has(b.id))];
    DB.sessions=Object.assign({},d.sessions||{},DB.sessions);
    sv();rH();alert('✅ Импортировано успешно.');
  }catch(err){alert('Ошибка: '+err.message);}};
  r.readAsText(f);inp.value='';
}

 [...logs].reverse().slice(0,8).forEach(l=>{
  const isPR=mW(l.sets)===allMax;
  h+=`<div class="card" style="padding:10px 12px;margin-bottom:6px;${isPR?'border-color:rgba(255,214,10,.3)':''}"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:12px;color:rgba(255,255,255,.5)">${fL(l.date)}</span><span style="font-size:12px;font-weight:600;color:#FFD60A">${mW(l.sets)} кг${isPR?' 🏆':''}</span></div><div style="display:flex;gap:4px;flex-wrap:wrap">${l.sets.map(s=>`<span style="background:rgba(255,255,255,.07);border-radius:7px;padding:2px 8px;font-size:11px">${s.w}кг×${s.r}</span>`).join('')}</div></div>`;
 });
 document.getElementById('pc').innerHTML=h;
 document.getElementById('po').classList.add('on');
}
function clP(){document.getElementById('po').classList.remove('on');}
function opT(name){const tips=T[name];if(!tips)return;document.getElementById('tn').textContent=name;document.getElementById('tt').innerHTML=tips.map((t,i)=>`<div style="display:flex;gap:10px;margin-bottom:10px"><span style="background:#BF5AF2;color:#fff;font-size:11px;font-weight:700;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">${i+1}</span><span>${t}</span></div>`).join('');document.getElementById('to').classList.add('on');}
function clTo(){document.getElementById('to').classList.remove('on');}

function opL(wk,en,eid){
 lmWk=wk;lmEn=en;lmEid=eid||null;lmC=W[wk].c;
 const existing=DB.logs.find(l=>l.id===eid);
 const ll=[...DB.logs].filter(l=>l.wk===wk&&l.en===en).sort((a,b)=>b.date.localeCompare(a.date))[0];
 const exDef=W[wk].e.find(e=>e[0]===en)||[];
 lmS=existing?existing.sets.map(s=>({w:s.w,r:s.r})):ll?ll.sets.map(s=>({w:s.w,r:s.r})):[{w:'',r:''}];
 document.getElementById('lch').innerHTML=`<span style="background:${lmC}22;color:${lmC};font-size:11px;font-weight:600;padding:2px 9px;border-radius:99px">${eid?'Редактировать':'Запись'}</span>`;
 document.getElementById('lt').textContent=en;
 document.getElementById('lp').textContent=exDef[1]?'План: '+exDef[1]:'';
 document.getElementById('lsb').style.background=lmC;
 document.getElementById('ln').value=existing?.note||'';
 document.getElementById('ld').value=existing?.date||td();
 const lle=document.getElementById('ll');
 if(ll&&!eid){lle.style.display='block';lle.innerHTML=`<div class="card" style="padding:9px 12px;border-color:${lmC}33;display:flex;justify-content:space-between;align-items:center;gap:8px"><div style="font-size:12px;color:${lmC};flex:1">${fL(ll.date)}: ${ll.sets.map(s=>s.w+'кг×'+s.r).join(' / ')}</div><button onclick="cpL('${ll.id}')" class="btn ghost" style="font-size:11px;padding:4px 9px;flex-shrink:0">Копировать</button></div>`;}
 else lle.style.display='none';
 rS();document.getElementById('lo').classList.add('on');
}
function cpL(id){const l=DB.logs.find(x=>x.id===id);if(l){lmS=l.sets.map(s=>({w:s.w,r:s.r}));rS();}}
function rS(){document.getElementById('ls').innerHTML=lmS.map((s,i)=>{const f=s.w&&s.r;return`<div id="sc${i}" style="background:rgba(255,255,255,.04);border:1px solid ${f?lmC+'44':'rgba(255,255,255,.12)'};border-radius:12px;padding:11px;margin-bottom:7px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span id="sl${i}" style="font-size:13px;font-weight:600;color:${f?lmC:'rgba(255,255,255,.5)'}">Подход ${i+1}${f?' ✓':''}</span>${lmS.length>1?`<button onclick="rmS(${i})" style="background:none;border:none;color:rgba(255,255,255,.35);font-size:17px;cursor:pointer">×</button>`:''}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div><div style="font-size:11px;color:rgba(255,255,255,.5);margin-bottom:4px">Вес (кг)</div><input type="number" inputmode="decimal" value="${s.w}" oninput="uS(${i},'w',this.value)" class="inp" style="text-align:center;font-size:24px;font-weight:700;color:${lmC};padding:9px 6px;border-radius:10px"/></div><div><div style="font-size:11px;color:rgba(255,255,255,.5);margin-bottom:4px">Повторений</div><input type="number" inputmode="numeric" value="${s.r}" oninput="uS(${i},'r',this.value)" class="inp" style="text-align:center;font-size:24px;font-weight:700;color:#0A84FF;padding:9px 6px;border-radius:10px"/></div></div></div>`;}).join('');uT();}
function uS(i,f,v){lmS[i][f]=v;const s=lmS[i],f2=s.w&&s.r;const c=document.getElementById('sc'+i),l=document.getElementById('sl'+i);if(c)c.style.borderColor=f2?lmC+'44':'rgba(255,255,255,.12)';if(l){l.textContent='Подход '+(i+1)+(f2?' ✓':'');l.style.color=f2?lmC:'rgba(255,255,255,.5)';}uT();}
function uT(){const mv=mW(lmS),tv=vl(lmS),t=document.getElementById('ltot');if(tv>0){t.style.display='grid';t.style.gridTemplateColumns='1fr 1fr';t.style.gap='8px';t.innerHTML=[{l:'Объём',v:tv.toFixed(0)+' кг',c:'#0A84FF'},{l:'Макс. вес',v:mv+' кг',c:lmC}].map(s=>`<div class="card" style="padding:9px;text-align:center"><div style="font-size:18px;font-weight:700;color:${s.c}">${s.v}</div><div style="font-size:11px;color:rgba(255,255,255,.5);margin-top:1px">${s.l}</div></div>`).join('');}else t.style.display='none';}
function addS(){lmS.push({w:lmS[lmS.length-1]?.w||'',r:''});rS();}
function rmS(i){if(lmS.length>1){lmS.splice(i,1);rS();}}
function svLog(){const valid=lmS.filter(s=>s.w!==''&&s.r!=='');if(!valid.length)return;const note=document.getElementById('ln').value,date=document.getElementById('ld').value;if(lmEid)DB.logs=DB.logs.map(l=>l.id===lmEid?{...l,sets:valid,note,date}:l);else DB.logs.push({id:Date.now()+'',wk:lmWk,en:lmEn,date,sid:cSid,sets:valid,note});sv();clLo();rW();}
function clLo(){document.getElementById('lo').classList.remove('on');}
function rHist(){
 const flt=[['ALL','Все'],...Object.entries(W).map(([k,w])=>[k,w.l])];
 document.getElementById('hf').innerHTML=flt.map(([k,l])=>`<button onclick="setHf('${k}')" class="btn" style="background:${hfv===k?'#0A84FF':'rgba(255,255,255,.08)'};color:${hfv===k?'#fff':'rgba(255,255,255,.55)'};border:${hfv===k?'none':'1px solid rgba(255,255,255,.15)'};font-size:11px;padding:4px 11px;white-space:nowrap;flex-shrink:0">${l}</button>`).join('');
 const fl=[...DB.logs].filter(l=>hfv==='ALL'||l.wk===hfv).sort((a,b)=>b.date.localeCompare(a.date));
 const gr=fl.reduce((a,l)=>{(a[l.date]||(a[l.date]=[])).push(l);return a;},{});
 let h='';
 Object.entries(gr).forEach(([date,es])=>{
  const sn=es[0]?.sid?DB.sessions[es[0].sid]?.note:'';
  h+=`<div style="margin-bottom:18px"><div style="font-size:12px;font-weight:600;color:rgba(255,255,255,.5);margin-bottom:${sn?3:7}px;display:flex;justify-content:space-between"><span>${fL(date)}</span><span>${es.length} упр.</span></div>${sn?`<div style="font-size:11px;color:rgba(255,255,255,.35);font-style:italic;margin-bottom:7px">${sn}</div>`:''}<div class="card" style="overflow:hidden">`;
  es.forEach((l,i)=>{const en=l.en.replace(/'/g,"\\'");h+=`<div style="padding:11px 13px;${i<es.length-1?'border-bottom:1px solid rgba(255,255,255,.1)':''}"><div style="display:flex;justify-content:space-between;align-items:center"><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600;margin-bottom:1px">${l.en}</div><div style="font-size:12px;color:rgba(255,255,255,.5)">${W[l.wk]?.l}</div></div><div style="display:flex;align-items:center;gap:7px"><div style="text-align:right"><div style="font-size:14px;font-weight:700;color:${W[l.wk]?.c||'#FFD60A'}">${mW(l.sets)} кг</div><div style="font-size:11px;color:rgba(255,255,255,.35)">${l.sets.length} подх.</div></div><button onclick="opL('${l.wk}','${en}','${l.id}')" class="btn" style="background:rgba(255,214,10,.1);color:#FFD60A;border:1px solid rgba(255,214,10,.4);font-size:11px;padding:4px 7px">✎</button><button onclick="askD('${l.id}')" style="background:none;border:none;cursor:pointer;color:rgba(255,255,255,.35);font-size:16px;padding:2px 3px">🗑</button></div></div><div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:7px">${l.sets.map(s=>`<span style="background:rgba(255,255,255,.07);border-radius:7px;padding:2px 9px;font-size:12px">${s.w}кг×${s.r}</span>`).join('')}</div>${l.note?`<div style="font-size:11px;color:rgba(255,255,255,.5);margin-top:5px;font-style:italic">${l.note}</div>`:''}</div>`;});
  h+=`</div></div>`;
 });
 if(!fl.length)h='<div style="text-align:center;padding:50px 20px;color:rgba(255,255,255,.5);font-size:14px">Нет записей</div>';
 document.getElementById('hl').innerHTML=h;
}
function setHf(f){hfv=f;rHist();}
function askD(id){cidDel=id;document.getElementById('co').classList.add('on');}
function doDel(){DB.logs=DB.logs.filter(l=>l.id!==cidDel);sv();clCo();rHist();}
function clCo(){document.getElementById('co').classList.remove('on');}
rH();
</script>
</body></html>
