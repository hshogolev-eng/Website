*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#000;color:#eef;font-family:-apple-system,sans-serif;max-width:430px;margin:0 auto;font-size:15px}

function expData(){const b=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='training-log-'+td()+'.json';a.click();URL.revokeObjectURL(a.href);}
function impData(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(!d.logs||!Array.isArray(d.logs)){alert('Неверный формат.');return;}if(!confirm('Импортировать '+d.logs.length+' записей?'))return;const ids=new Set(DB.logs.map(l=>l.id));DB.logs=[...DB.logs,...d.logs.filter(l=>!ids.has(l.id))];const bids=new Set(DB.bws.map(b=>b.id));DB.bws=[...DB.bws,...(d.bws||[]).filter(b=>!bids.has(b.id))];DB.sessions=Object.assign({},d.sessions||{},DB.sessions);sv();rH();alert('✅ Импортировано.');}catch(err){alert('Ошибка: '+err.message);}};r.readAsText(f);inp.value='';}

function rH(){
 const{logs,bws}=DB;
 const sess=new Set(logs.map(l=>l.sid)).size;
 const d=new Date(),ws=new Date(d),we=new Date(d);
 ws.setDate(d.getDate()-d.getDay()+1);we.setDate(d.getDate()-d.getDay()+7);
 const wk=new Set(logs.filter(l=>l.date>=ws.toISOString().split('T')[0]&&l.date<=we.toISOString().split('T')[0]).map(l=>l.sid)).size;
 const sb=[...bws].sort((a,b)=>a.date.localeCompare(b.date)),lb=sb[sb.length-1];
 document.getElementById('st').innerHTML=[{l:'Сессий',v:sess,c:'#FFD60A'},{l:'Неделя',v:wk,c:'#0A84FF'},{l:'Вес',v:lb?lb.w+'кг':'—',c:'#30D158'}].map(s=>`<div class="card" style="flex:1;padding:12px 8px;text-align:center"><div style="font-size:22px;font-weight:700;color:${s.c}">${s.v}</div><div style="font-size:9px;color:rgba(255,255,255,.35);margin-top:2px;text-transform:uppercase;letter-spacing:.04em">${s.l}</div></div>`).join('');
 const sg=sugN(logs),se=document.getElementById('sg');
 if(sg){const w=W[sg.k];se.style.display='block';se.innerHTML=`<div class="card" style="padding:13px 15px;border-color:${w.c}44;display:flex;justify-content:space-between;align-items:center;gap:10px"><div><div style="font-size:11px;color:${w.c};font-weight:600;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em">Следующая по программе</div><div style="font-size:16px;font-weight:600">${w.l}</div><div style="font-size:12px;color:rgba(255,255,255,.5)">${fL(sg.d)}</div></div><button onclick="opW('${sg.k}')" class="btn" style="background:#0A84FF;color:#fff;padding:8px 16px;flex-shrink:0">Начать</button></div>`;}
 else se.style.display='none';
 document.getElementById('bi').value='';
 document.getElementById('bl').textContent=lb?'Последний: '+lb.w+' кг · '+fL(lb.date):'';
 document.getElementById('wg').innerHTML=Object.entries(W).map(([k,w])=>{
  const cnt=new Set(logs.filter(l=>l.wk===k).map(l=>l.sid)).size;
  const nx=sg&&sg.k===k;
  return`<div onclick="opW('${k}')" style="background:${nx?w.c+'0A':'rgba(255,255,255,.07)'};border:1px solid ${nx?w.c+'55':'rgba(255,255,255,.12)'};border-radius:14px;padding:15px;cursor:pointer"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="background:${w.c}22;color:${w.c};font-size:11px;font-weight:600;padding:2px 9px;border-radius:99px">${w.t}</span>${nx?`<span style="font-size:11px;color:${w.c};font-weight:600">← след.</span>`:''}</div><div style="font-size:17px;font-weight:700;margin-bottom:4px">${w.l}</div><div style="font-size:11px;color:rgba(255,255,255,.4);margin-bottom:4px">${w.eq}</div><div style="font-size:12px;color:rgba(255,255,255,.5)">${cnt?cnt+' сессий':'Нет данных'}</div></div>`;
 }).join('');
 const rec=[...logs].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,3);
 const rw=document.getElementById('rw');
 if(rec.length){rw.style.display='block';document.getElementById('rl').innerHTML=rec.map((l,i)=>`<div style="padding:11px 14px;${i<rec.length-1?'border-bottom:1px solid rgba(255,255,255,.1)':''}display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:14px;font-weight:600;margin-bottom:1px">${l.en}</div><div style="font-size:12px;color:rgba(255,255,255,.5)">${W[l.wk]?.l} · ${fL(l.date)}</div></div><div style="text-align:right"><div style="font-size:15px;font-weight:700;color:${W[l.wk]?.c||'#FFD60A'}">${mW(l.sets)} кг</div><div style="font-size:11px;color:rgba(255,255,255,.35)">${l.sets.length} подх.</div></div></div>`).join('');}
 else rw.style.display='none';
}

  const en=ex[0].replace(/'/g,"\\'"),hasTech=!!T[ex[0]];
  const isAbs=i>=w.e.length-2;
  return`<div style="background:${dn?w.c+'0A':isAbs?'rgba(48,209,88,.04)':'rgba(255,255,255,.07)'};border:1px solid ${dn?w.c+'33':isAbs?'rgba(48,209,88,.2)':'rgba(255,255,255,.12)'};border-radius:14px;padding:12px 13px;margin-bottom:7px"><div style="display:flex;gap:8px;align-items:flex-start"><div style="flex:1;min-width:0"><div style="font-size:15px;font-weight:600;color:${dn?'rgba(255,255,255,.5)':'#eef'};margin-bottom:3px">${dn?`<span style="color:${w.c};margin-right:4px">✓</span>`:''}${isAbs?'<span style="color:#30D158;margin-right:4px;font-size:12px">ПРЕСС</span>':''}${ex[0]}</div><div style="font-size:12px;color:rgba(255,255,255,.5);margin-bottom:${ex[3]?2:0}px">${ex[1]} · ${ex[2]}</div>${ex[3]?`<div style="font-size:11px;color:#5AC8FA;opacity:.8;margin-bottom:${last?2:0}px">${ex[3]}</div>`:''}${last?`<div style="font-size:11px;color:${w.c};opacity:.8">Прошлый: ${mW(last.sets)} кг · ${f2(last.date)}</div>`:''}</div><div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end;flex-shrink:0"><div style="display:flex;gap:4px"><button onclick="opL('${cWk}','${en}',null)" class="btn" style="background:${dn?'rgba(255,255,255,.08)':w.c+'22'};color:${dn?'rgba(255,255,255,.5)':w.c};border:1px solid ${dn?'rgba(255,255,255,.1)':w.c+'44'};font-size:12px;padding:5px 11px">${dn?'+ ещё':'+ Лог'}</button>${tlog?`<button onclick="opL('${cWk}','${en}','${tlog.id}')" class="btn" style="background:rgba(255,214,10,.1);color:#FFD60A;border:1px solid rgba(255,214,10,.4);font-size:12px;padding:5px 8px">✎</button>`:''}</div><div style="display:flex;gap:4px"><button onclick="opP('${cWk}','${en}')" class="btn" style="background:rgba(90,200,250,.1);color:#5AC8FA;border:1px solid rgba(90,200,250,.4);font-size:11px;padding:4px 8px">Прогр.</button><button onclick="opGif('${en}')" class="btn" style="background:rgba(255,55,95,.1);color:#FF375F;border:1px solid rgba(255,55,95,.4);font-size:11px;padding:4px 8px">GIF</button>${hasTech?`<button onclick="opT('${en}')" class="btn" style="background:rgba(191,95,242,.15);color:#BF5AF2;border:1px solid rgba(191,95,242,.4);font-size:11px;padding:4px 8px">?</button>`:''}</div></div></div></div>`;
 }).join('');
}

function svSN(n){DB.sessions[cSid]={wk:cWk,date:td(),note:n};sv();}
function opGif(q){window.open('https://www.google.com/search?q='+encodeURIComponent(q+' exercise gif')+'&tbm=isch','_blank');}
function opT(name){const tips=T[name];if(!tips)return;document.getElementById('tn').textContent=name;document.getElementById('tt').innerHTML=tips.map((t,i)=>`<div style="display:flex;gap:10px;margin-bottom:10px"><span style="background:#BF5AF2;color:#fff;font-size:11px;font-weight:700;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">${i+1}</span><span>${t}</span></div>`).join('');document.getElementById('to').classList.add('on');}
function clTo(){document.getElementById('to').classList.remove('on');}

function opP(wk,en){
 const w=W[wk]||{c:'#0A84FF',l:''},c=w.c;
 const logs=DB.logs.filter(l=>l.wk===wk&&l.en===en).sort((a,b)=>a.date.localeCompare(b.date));
 document.getElementById('pt').textContent=en;
 const pc=document.getElementById('pc');
 if(!logs.length){
  pc.innerHTML=`<div style="text-align:center;padding:80px 20px"><div style="font-size:48px;color:rgba(255,255,255,.18);margin-bottom:14px">◇</div><div style="font-size:15px;color:rgba(255,255,255,.4)">Нет данных</div></div>`;
  go('sp');return;
 }
 const allMax=Math.max(...logs.map(l=>mW(l.sets)));
 const last=logs[logs.length-1],prev=logs[logs.length-2];
 const lastMax=mW(last.sets);
 const delta=prev?lastMax-mW(prev.sets):null;
 const dC=delta>0?'#30D158':delta<0?'#FF375F':'rgba(255,255,255,.7)';
 const dT=delta!==null?(delta>0?'+':'')+delta+' кг':'—';
 let h=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px">`;
 h+=[
  {l:'Рекорд',v:allMax+' кг',c:c},
  {l:'Последний',v:lastMax+' кг',c:'#eef'},
  {l:'Δ от пред.',v:dT,c:dC},
  {l:'Сессий',v:logs.length,c:'#5AC8FA'},
 ].map(s=>`<div class="card" style="padding:12px;text-align:center"><div style="font-size:22px;font-weight:700;color:${s.c}">${s.v}</div><div style="font-size:11px;color:rgba(255,255,255,.5);margin-top:3px;text-transform:uppercase;letter-spacing:.04em">${s.l}</div></div>`).join('');
 h+=`</div>`;
 if(logs.length>=2){
  const pts=logs.map(l=>mW(l.sets));
  const mx=Math.max(...pts),mn=Math.min(...pts),rg=mx-mn||1;
  const VW=320,VH=110,P=14;
  const xs=pts.map((_,i)=>P+(i/(pts.length-1))*(VW-2*P));
  const ys=pts.map(v=>P+(1-(v-mn)/rg)*(VH-2*P));
  const path=xs.map((x,i)=>(i?'L':'M')+x.toFixed(1)+' '+ys[i].toFixed(1)).join(' ');
  const area=path+` L ${xs[xs.length-1].toFixed(1)} ${VH-P} L ${xs[0].toFixed(1)} ${VH-P} Z`;
  const dots=xs.map((x,i)=>`<circle cx="${x.toFixed(1)}" cy="${ys[i].toFixed(1)}" r="3.5" fill="${c}"/>`).join('');
  h+=`<div class="card" style="padding:14px;margin-bottom:18px"><div style="font-size:12px;font-weight:600;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px">Динамика макс. веса</div><svg viewBox="0 0 ${VW} ${VH}" style="width:100%;height:auto;display:block"><path d="${area}" fill="${c}" opacity=".12"/><path d="${path}" stroke="${c}" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>${dots}</svg></div>`;
 }
 h+=`<div style="font-size:12px;font-weight:600;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">История</div><div class="card" style="overflow:hidden">`;
 [...logs].reverse().forEach((l,i,arr)=>{
  const isPR=mW(l.sets)===allMax;
  h+=`<div style="padding:11px 14px;${i<arr.length-1?'border-bottom:1px solid rgba(255,255,255,.1)':''}"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:13px;color:rgba(255,255,255,.7)">${fL(l.date)}</span><span style="font-size:14px;font-weight:700;color:${c}">${mW(l.sets)} кг${isPR?' 🏆':''}</span></div><div style="display:flex;gap:4px;flex-wrap:wrap">${l.sets.map(s=>`<span style="background:rgba(255,255,255,.07);border-radius:7px;padding:2px 8px;font-size:11px">${s.w}кг×${s.r}</span>`).join('')}</div>${l.note?`<div style="font-size:11px;color:rgba(255,255,255,.5);margin-top:5px;font-style:italic">${l.note}</div>`:''}</div>`;
 });
 h+=`</div>`;
 pc.innerHTML=h;
 go('sp');
}

function opL(wk,en,eid){
 lmWk=wk;lmEn=en;lmEid=eid||null;lmC=W[wk].c;
 const existing=DB.logs.find(l=>l.id===eid);
 const ll=[...DB.logs].filter(l=>l.wk===wk&&l.en===en).sort((a,b)=>b.date.localeCompare(a.date))[0];
 const exDef=W[wk].e.find(e=>e[0]===en)||[];
 lmS=existing?existing.sets.map(s=>({w:s.w,r:s.r})):ll?ll.sets.map(s=>({w:s.w,r:s.r})):[{w:'',r:''}];
 document.getElementById('lch').innerHTML=`<span style="background:${lmC}22;color:${lmC};font-size:11px;font-weight:600;padding:2px 9px;border-radius:99px">${eid?'Редактировать':'Запись'}</span>`;
 document.getElementById('lt').textContent=en;
 document.getElementById('lp').textContent=exDef[1]?'План: '+exDef[1]:'';
 document.getElementById('lsb').style.background=lmC;
 document.getElementById('ln').value=existing?.note||'';
 document.getElementById('ld').value=existing?.date||td();
 const lle=document.getElementById('ll');
 if(ll&&!eid){lle.style.display='block';lle.innerHTML=`<div class="card" style="padding:9px 12px;border-color:${lmC}33;display:flex;justify-content:space-between;align-items:center;gap:8px"><div style="font-size:12px;color:${lmC};flex:1">${fL(ll.date)}: ${ll.sets.map(s=>s.w+'кг×'+s.r).join(' / ')}</div><button onclick="cpL('${ll.id}')" class="btn ghost" style="font-size:11px;padding:4px 9px;flex-shrink:0">Копировать</button></div>`;}
 else lle.style.display='none';
 rS();document.getElementById('lo').classList.add('on');
}
function cpL(id){const l=DB.logs.find(x=>x.id===id);if(l){lmS=l.sets.map(s=>({w:s.w,r:s.r}));rS();}}
function rS(){document.getElementById('ls').innerHTML=lmS.map((s,i)=>{const f=s.w&&s.r;return`<div id="sc${i}" style="background:rgba(255,255,255,.04);border:1px solid ${f?lmC+'44':'rgba(255,255,255,.12)'};border-radius:12px;padding:11px;margin-bottom:7px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span id="sl${i}" style="font-size:13px;font-weight:600;color:${f?lmC:'rgba(255,255,255,.5)'}">Подход ${i+1}${f?' ✓':''}</span>${lmS.length>1?`<button onclick="rmS(${i})" style="background:none;border:none;color:rgba(255,255,255,.35);font-size:17px;cursor:pointer">×</button>`:''}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div><div style="font-size:11px;color:rgba(255,255,255,.5);margin-bottom:4px">Вес (кг)</div><input type="number" inputmode="decimal" value="${s.w}" oninput="uS(${i},'w',this.value)" class="inp" style="text-align:center;font-size:24px;font-weight:700;color:${lmC};padding:9px 6px;border-radius:10px"/></div><div><div style="font-size:11px;color:rgba(255,255,255,.5);margin-bottom:4px">Повторений</div><input type="number" inputmode="numeric" value="${s.r}" oninput="uS(${i},'r',this.value)" class="inp" style="text-align:center;font-size:24px;font-weight:700;color:#0A84FF;padding:9px 6px;border-radius:10px"/></div></div></div>`;}).join('');uT();}
function uS(i,f,v){lmS[i][f]=v;const s=lmS[i],f2=s.w&&s.r;const c=document.getElementById('sc'+i),l=document.getElementById('sl'+i);if(c)c.style.borderColor=f2?lmC+'44':'rgba(255,255,255,.12)';if(l){l.textContent='Подход '+(i+1)+(f2?' ✓':'');l.style.color=f2?lmC:'rgba(255,255,255,.5)';}uT();}
function uT(){const mv=mW(lmS),tv=vl(lmS),t=document.getElementById('ltot');if(tv>0){t.style.display='grid';t.style.gridTemplateColumns='1fr 1fr';t.style.gap='8px';t.innerHTML=[{l:'Объём',v:tv.toFixed(0)+' кг',c:'#0A84FF'},{l:'Макс. вес',v:mv+' кг',c:lmC}].map(s=>`<div class="card" style="padding:9px;text-align:center"><div style="font-size:18px;font-weight:700;color:${s.c}">${s.v}</div><div style="font-size:11px;color:rgba(255,255,255,.5);margin-top:1px">${s.l}</div></div>`).join('');}else t.style.display='none';}
function addS(){lmS.push({w:lmS[lmS.length-1]?.w||'',r:''});rS();}
function rmS(i){if(lmS.length>1){lmS.splice(i,1);rS();}}
function svLog(){const valid=lmS.filter(s=>s.w!==''&&s.r!=='');if(!valid.length)return;const note=document.getElementById('ln').value,date=document.getElementById('ld').value;if(lmEid)DB.logs=DB.logs.map(l=>l.id===lmEid?{...l,sets:valid,note,date}:l);else DB.logs.push({id:Date.now()+'',wk:lmWk,en:lmEn,date,sid:cSid,sets:valid,note});sv();clLo();rW();}
function clLo(){document.getElementById('lo').classList.remove('on');}
function rHist(){
 const flt=[['ALL','Все'],...Object.entries(W).map(([k,w])=>[k,w.l])];
 document.getElementById('hf').innerHTML=flt.map(([k,l])=>`<button onclick="setHf('${k}')" class="btn" style="background:${hfv===k?'#0A84FF':'rgba(255,255,255,.08)'};color:${hfv===k?'#fff':'rgba(255,255,255,.55)'};border:${hfv===k?'none':'1px solid rgba(255,255,255,.15)'};font-size:11px;padding:4px 11px;white-space:nowrap;flex-shrink:0">${l}</button>`).join('');
 const fl=[...DB.logs].filter(l=>hfv==='ALL'||l.wk===hfv).sort((a,b)=>b.date.localeCompare(a.date));
 const gr=fl.reduce((a,l)=>{(a[l.date]||(a[l.date]=[])).push(l);return a;},{});
 let h='';
 Object.entries(gr).forEach(([date,es])=>{
  const sn=es[0]?.sid?DB.sessions[es[0].sid]?.note:'';
  h+=`<div style="margin-bottom:18px"><div style="font-size:12px;font-weight:600;color:rgba(255,255,255,.5);margin-bottom:${sn?3:7}px;display:flex;justify-content:space-between"><span>${fL(date)}</span><span>${es.length} упр.</span></div>${sn?`<div style="font-size:11px;color:rgba(255,255,255,.35);font-style:italic;margin-bottom:7px">${sn}</div>`:''}<div class="card" style="overflow:hidden">`;
  es.forEach((l,i)=>{const en=l.en.replace(/'/g,"\\'");h+=`<div style="padding:11px 13px;${i<es.length-1?'border-bottom:1px solid rgba(255,255,255,.1)':''}"><div style="display:flex;justify-content:space-between;align-items:center"><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600;margin-bottom:1px">${l.en}</div><div style="font-size:12px;color:rgba(255,255,255,.5)">${W[l.wk]?.l}</div></div><div style="display:flex;align-items:center;gap:7px"><div style="text-align:right"><div style="font-size:14px;font-weight:700;color:${W[l.wk]?.c||'#FFD60A'}">${mW(l.sets)} кг</div><div style="font-size:11px;color:rgba(255,255,255,.35)">${l.sets.length} подх.</div></div><button onclick="opL('${l.wk}','${en}','${l.id}')" class="btn" style="background:rgba(255,214,10,.1);color:#FFD60A;border:1px solid rgba(255,214,10,.4);font-size:11px;padding:4px 7px">✎</button><button onclick="askD('${l.id}')" style="background:none;border:none;cursor:pointer;color:rgba(255,255,255,.35);font-size:16px;padding:2px 3px">🗑</button></div></div><div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:7px">${l.sets.map(s=>`<span style="background:rgba(255,255,255,.07);border-radius:7px;padding:2px 9px;font-size:12px">${s.w}кг×${s.r}</span>`).join('')}</div>${l.note?`<div style="font-size:11px;color:rgba(255,255,255,.5);margin-top:5px;font-style:italic">${l.note}</div>`:''}</div>`;});
  h+=`</div></div>`;
 });
 if(!fl.length)h='<div style="text-align:center;padding:50px 20px;color:rgba(255,255,255,.5);font-size:14px">Нет записей</div>';
 document.getElementById('hl').innerHTML=h;
}
function setHf(f){hfv=f;rHist();}
function askD(id){cidDel=id;document.getElementById('co').classList.add('on');}
function doDel(){DB.logs=DB.logs.filter(l=>l.id!==cidDel);sv();clCo();rHist();}
function clCo(){document.getElementById('co').classList.remove('on');}
rH();
</script>
</body></html>
